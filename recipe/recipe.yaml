schema_version: 1

context:
  name: microstructpy
  version: 1.5.9

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/microstructpy-${{ version }}.tar.gz
  sha256: a1bafda7fa99bb6071f7d5af8ac4bc0ec215c6c5f7b22cb48b51af0f06b28058

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - microstructpy = microstructpy.cli:main

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - aabbtree >=2.5.0
    - pybind11
    - lsq-ellipse
    - matplotlib-base >=3.4.0
    - meshpy >=2018.2.1
    - numpy >=1.22.2
    - pygmsh >=7.0.2
    - pyquaternion
    - pyvoro-mmalahe >=1.3.4
    - scipy
    - xmltodict

tests:
  - python:
      imports:
        - microstructpy
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - microstructpy --help

about:
  summary: Microstructure modeling, mesh generation, analysis, and visualization.
  license: MIT
  license_file: LICENSE.rst
  homepage: https://github.com/kip-hart/MicroStructPy

extra:
  recipe-maintainers:
    - jan-janssen
